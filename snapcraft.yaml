name: comscope
base: core22
version: '1.0.3'
summary: Serial port terminal for embedded development boards on Linux
description: |
  ComScope is a lightweight, fast serial port terminal designed for embedded 
  developers on Linux. It provides an intuitive ncurses-based interface for 
  communicating with microcontrollers, Arduino boards, and other serial devices.
  
  Features:
  - Low latency serial communication
  - Clean ncurses terminal UI with intuitive navigation
  - Auto-port and baudrate detection for available serial ports
  - ASCII to Hex and Hex to ASCII toggle mode
  - Pause/Resume Output
  - Session logging with timestamps
  - Color support for various terminals
  - Easy keyboard navigation

grade: stable
confinement: strict

issues:
  - https://github.com/prkshdas/ComScope/issues

source-code: https://github.com/prkshdas/ComScope

website: https://github.com/prkshdas/ComScope

apps:
  comscope:
    command: bin/comscope
    plugs:
      - serial-port
      - hardware-observe
    environment:
      TERM: xterm-256color

plugs:
  serial-port:
    interface: serial-port

parts:
  comscope:
    plugin: make
    source: .
    build-packages:
      - gcc
      - make
      - pkg-config
      - libncurses-dev
    stage-packages:
      - libncurses6
      - libtinfo6
    override-build: |
      make clean
      make
      mkdir -p $SNAPCRAFT_PART_INSTALL/bin
      if [ ! -f ComScope ]; then
        echo "ERROR: ComScope executable not found after build"
        exit 1
      fi
      install -m 755 ComScope $SNAPCRAFT_PART_INSTALL/bin/comscope